      summary: Amazon WorkMail List Mobile Device Access Overrides
      tags:
      - '#X Amz Target=WorkMailService.ListMobileDeviceAccessOverrides'
components:
  schemas:
    EntityIdentifier:
      type: string
      pattern: '[a-zA-Z0-9._%+@-]+'
      minLength: 1
      maxLength: 256
    ListMobileDeviceAccessOverridesRequest:
      type: object
      required:
      - OrganizationId
      title: ListMobileDeviceAccessOverridesRequest
      properties:
        OrganizationId:
          allOf:
          - $ref: '#/components/schemas/OrganizationId'
          - description: The WorkMail organization under which to list mobile device access overrides.
        UserId:
          allOf:
          - $ref: '#/components/schemas/EntityIdentifier'
          - description: '<p>The WorkMail user under which you list the mobile device access overrides. Accepts the following types of user identities:</p> <ul> <li> <p>User ID: <code>12345678-1234-1234-1234-123456789012</code> or <code>S-1-1-12-1234567890-123456789-123456789-1234</code> </p> </li> <li> <p>Email address: <code>user@domain.tld</code> </p> </li> <li> <p>User name: <code>user</code> </p> </li> </ul>'
        DeviceId:
          allOf:
          - $ref: '#/components/schemas/DeviceId'
          - description: The mobile device to which the access override applies.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/NextToken'
          - description: The token to use to retrieve the next page of results. The first call does not require a token.
        MaxResults:
          allOf:
          - $ref: '#/components/schemas/MaxResults'
          - description: The maximum number of results to return in a single call.
    OrganizationId:
      type: string
      pattern: ^m-[0-9a-f]{32}$
      minLength: 34
      maxLength: 34
    OrganizationStateException: {}
    DeviceId:
      type: string
      pattern: '[A-Za-z0-9]+'
      minLength: 1
      maxLength: 32
    MobileDeviceAccessOverride:
      type: object
      properties:
        UserId:
          allOf:
          - $ref: '#/components/schemas/WorkMailIdentifier'
          - description: The WorkMail user to which the access override applies.
        DeviceId:
          allOf:
          - $ref: '#/components/schemas/DeviceId'
          - description: The device to which the override applies.
        Effect:
          allOf:
          - $ref: '#/components/schemas/MobileDeviceAccessRuleEffect'
          - description: The effect of the override, <code>ALLOW</code> or <code>DENY</code>.
        Description:
          allOf:
          - $ref: '#/components/schemas/MobileDeviceAccessRuleDescription'
          - description: A description of the override.
        DateCreated:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The date the override was first created.
        DateModified:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The date the override was last modified.
      description: The override object.
    InvalidParameterException: {}
    OrganizationNotFoundException: {}
    MaxResults:
      type: integer
      minimum: 1
      maximum: 100
    MobileDeviceAccessRuleEffect:
      type: string
      enum:
      - ALLOW
      - DENY
    MobileDeviceAccessRuleDescription:
      type: string
      pattern: '[\S\s]+'
      minLength: 1
      maxLength: 256
    NextToken:
      type: string
      pattern: '[\S\s]*|[a-zA-Z0-9/+=]{1,1024}'
      minLength: 1
      maxLength: 1024
    ListMobileDeviceAccessOverridesResponse:
      type: object
      properties:
        Overrides:
          allOf:
          - $ref: '#/components/schemas/MobileDeviceAccessOverridesList'
          - description: The list of mobile device access overrides that exist for the specified WorkMail organization and user.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/NextToken'
          - description: The token to use to retrieve the next page of results. The value is “null” when there are no more results to return.
    WorkMailIdentifier:
      type: string
      minLength: 12
      maxLength: 256
    EntityNotFoundException: {}
    MobileDeviceAccessOverridesList:
      type: array
      items:
        $ref: '#/components/schemas/MobileDeviceAccessOverride'
    Timestamp:
      type: string
      format: date-time
