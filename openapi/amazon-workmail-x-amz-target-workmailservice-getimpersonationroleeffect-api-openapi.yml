    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: GetImpersonationRoleEffect
      description: Tests whether the given impersonation role can impersonate a target user.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetImpersonationRoleEffectResponse'
        '480':
          description: InvalidParameterException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidParameterException'
        '481':
          description: OrganizationNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationNotFoundException'
        '482':
          description: OrganizationStateException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationStateException'
        '483':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '484':
          description: EntityNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityNotFoundException'
        '485':
          description: EntityStateException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityStateException'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetImpersonationRoleEffectRequest'
      parameters:
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - WorkMailService.GetImpersonationRoleEffect
      summary: Amazon WorkMail Get Impersonation Role Effect
      tags:
      - '#X Amz Target=WorkMailService.GetImpersonationRoleEffect'
components:
  schemas:
    ImpersonationRuleId:
      type: string
      pattern: '[a-zA-Z0-9_-]+'
      minLength: 1
      maxLength: 64
    ResourceNotFoundException: {}
    AccessEffect:
      type: string
      enum:
      - ALLOW
      - DENY
    EntityIdentifier:
      type: string
      pattern: '[a-zA-Z0-9._%+@-]+'
      minLength: 1
      maxLength: 256
    EntityStateException: {}
    OrganizationStateException: {}
    OrganizationId:
      type: string
      pattern: ^m-[0-9a-f]{32}$
      minLength: 34
      maxLength: 34
    ImpersonationMatchedRule:
      type: object
      properties:
        ImpersonationRuleId:
          allOf:
          - $ref: '#/components/schemas/ImpersonationRuleId'
          - description: The ID of the rule that matched the input
        Name:
          allOf:
          - $ref: '#/components/schemas/ImpersonationRuleName'
          - description: The name of the rule that matched the input.
      description: The impersonation rule that matched the input.
    InvalidParameterException: {}
    ImpersonationMatchedRuleList:
      type: array
      items:
        $ref: '#/components/schemas/ImpersonationMatchedRule'
      minItems: 0
      maxItems: 10
    OrganizationNotFoundException: {}
    ImpersonationRoleId:
      type: string
      pattern: '[a-zA-Z0-9_-]+'
      minLength: 1
      maxLength: 64
    ImpersonationRuleName:
      type: string
      pattern: '[^\x00-\x1F\x7F\x3C\x3E\x5C]+'
      minLength: 1
      maxLength: 64
    GetImpersonationRoleEffectRequest:
      type: object
      required:
      - OrganizationId
      - ImpersonationRoleId
      - TargetUser
      title: GetImpersonationRoleEffectRequest
      properties:
        OrganizationId:
          allOf:
          - $ref: '#/components/schemas/OrganizationId'
          - description: The WorkMail organization where the impersonation role is defined.
        ImpersonationRoleId:
          allOf:
          - $ref: '#/components/schemas/ImpersonationRoleId'
          - description: The impersonation role ID to test.
        TargetUser:
          allOf:
          - $ref: '#/components/schemas/EntityIdentifier'
          - description: '<p>The WorkMail organization user chosen to test the impersonation role. The following identity formats are available:</p> <ul> <li> <p>User ID: <code>12345678-1234-1234-1234-123456789012</code> or <code>S-1-1-12-1234567890-123456789-123456789-1234</code> </p> </li> <li> <p>Email address: <code>user@domain.tld</code> </p> </li> <li> <p>User name: <code>user</code> </p> </li> </ul>'
    EntityNotFoundException: {}
    GetImpersonationRoleEffectResponse:
      type: object
      properties:
        Type:
          allOf:
          - $ref: '#/components/schemas/ImpersonationRoleType'
          - description: The impersonation role type.
        Effect:
          allOf:
          - $ref: '#/components/schemas/AccessEffect'
          - description: ' <code/>Effect of the impersonation role on the target user based on its rules. Available effects are <code>ALLOW</code> or <code>DENY</code>.'
        MatchedRules:
          allOf:
          - $ref: '#/components/schemas/ImpersonationMatchedRuleList'
          - description: A list of the rules that match the input and produce the configured effect.
    ImpersonationRoleType:
      type: string
      enum:
      - FULL_ACCESS
      - READ_ONLY
