security:
- hmac: []
tags:
- name: '#X Amz Target=WorkMailService.GetMobileDeviceAccessEffect'
paths:
  /#X-Amz-Target=WorkMailService.GetMobileDeviceAccessEffect:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: GetMobileDeviceAccessEffect
      description: Simulates the effect of the mobile device access rules for the given attributes of a sample access event. Use this method to test the effects of the current set of mobile device access rules for the WorkMail organization for a particular user's attributes.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetMobileDeviceAccessEffectResponse'
        '480':
          description: InvalidParameterException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidParameterException'
        '481':
          description: OrganizationNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationNotFoundException'
        '482':
          description: OrganizationStateException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationStateException'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetMobileDeviceAccessEffectRequest'
      parameters:
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - WorkMailService.GetMobileDeviceAccessEffect
      summary: Amazon WorkMail Get Mobile Device Access Effect
      tags:
      - '#X Amz Target=WorkMailService.GetMobileDeviceAccessEffect'
components:
  schemas:
    MobileDeviceAccessRuleName:
      type: string
      pattern: '[\S\s]+'
      minLength: 1
      maxLength: 64
    OrganizationId:
      type: string
      pattern: ^m-[0-9a-f]{32}$
      minLength: 34
      maxLength: 34
    OrganizationStateException: {}
    MobileDeviceAccessRuleId:
      type: string
      pattern: '[a-zA-Z0-9_-]+'
      minLength: 1
      maxLength: 64
    MobileDeviceAccessMatchedRuleList:
      type: array
      items:
        $ref: '#/components/schemas/MobileDeviceAccessMatchedRule'
      minItems: 0
      maxItems: 10
    DeviceType:
      type: string
      pattern: '[\u0020-\u00FF]+'
      minLength: 1
      maxLength: 256
    InvalidParameterException: {}
    OrganizationNotFoundException: {}
    MobileDeviceAccessMatchedRule:
      type: object
      properties:
        MobileDeviceAccessRuleId:
          allOf:
          - $ref: '#/components/schemas/MobileDeviceAccessRuleId'
          - description: Identifier of the rule that a simulated user matches.
        Name:
          allOf:
          - $ref: '#/components/schemas/MobileDeviceAccessRuleName'
          - description: Name of a rule that a simulated user matches.
      description: The rule that a simulated user matches.
    MobileDeviceAccessRuleEffect:
      type: string
      enum:
      - ALLOW
      - DENY
    GetMobileDeviceAccessEffectResponse:
      type: object
      properties:
        Effect:
          allOf:
          - $ref: '#/components/schemas/MobileDeviceAccessRuleEffect'
          - description: The effect of the simulated access, <code>ALLOW</code> or <code>DENY</code>, after evaluating mobile device access rules in the WorkMail organization for the simulated user parameters.
        MatchedRules:
          allOf:
          - $ref: '#/components/schemas/MobileDeviceAccessMatchedRuleList'
          - description: A list of the rules which matched the simulated user input and produced the effect.
    DeviceModel:
      type: string
      pattern: '[\u0020-\u00FF]+'
      minLength: 1
      maxLength: 256
    GetMobileDeviceAccessEffectRequest:
      type: object
      required:
      - OrganizationId
      title: GetMobileDeviceAccessEffectRequest
      properties:
        OrganizationId:
          allOf:
          - $ref: '#/components/schemas/OrganizationId'
          - description: The WorkMail organization to simulate the access effect for.
        DeviceType:
          allOf:
          - $ref: '#/components/schemas/DeviceType'
          - description: Device type the simulated user will report.
        DeviceModel:
          allOf:
          - $ref: '#/components/schemas/DeviceModel'
          - description: Device model the simulated user will report.
        DeviceOperatingSystem:
          allOf:
          - $ref: '#/components/schemas/DeviceOperatingSystem'
          - description: Device operating system the simulated user will report.
        DeviceUserAgent:
          allOf:
          - $ref: '#/components/schemas/DeviceUserAgent'
          - description: Device user agent the simulated user will report.
    DeviceUserAgent:
      type: string
      pattern: '[\u0020-\u00FF]+'
      minLength: 1
      maxLength: 256
    DeviceOperatingSystem:
      type: string
      pattern: '[\u0020-\u00FF]+'
      minLength: 1
      maxLength: 256
  parameters:
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
