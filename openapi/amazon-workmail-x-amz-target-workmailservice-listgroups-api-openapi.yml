    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: ListGroups
      description: Returns summaries of the organization's groups.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListGroupsResponse'
        '480':
          description: EntityNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntityNotFoundException'
        '481':
          description: InvalidParameterException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidParameterException'
        '482':
          description: OrganizationNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationNotFoundException'
        '483':
          description: OrganizationStateException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationStateException'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListGroupsRequest'
      parameters:
      - name: MaxResults
        in: query
        schema:
          type: string
        description: Pagination limit
        required: false
      - name: NextToken
        in: query
        schema:
          type: string
        description: Pagination token
        required: false
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - WorkMailService.ListGroups
      summary: Amazon WorkMail List Groups
      tags:
      - '#X Amz Target=WorkMailService.ListGroups'
components:
  schemas:
    ListGroupsResponse:
      type: object
      properties:
        Groups:
          allOf:
          - $ref: '#/components/schemas/Groups'
          - description: The overview of groups for an organization.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/NextToken'
          - description: The token to use to retrieve the next page of results. The value is "null" when there are no more results to return.
    OrganizationId:
      type: string
      pattern: ^m-[0-9a-f]{32}$
      minLength: 34
      maxLength: 34
    OrganizationStateException: {}
    Groups:
      type: array
      items:
        $ref: '#/components/schemas/Group'
    InvalidParameterException: {}
    EntityState:
      type: string
      enum:
      - ENABLED
      - DISABLED
      - DELETED
    Group:
      type: object
      properties:
        Id:
          allOf:
          - $ref: '#/components/schemas/WorkMailIdentifier'
          - description: The identifier of the group.
        Email:
          allOf:
          - $ref: '#/components/schemas/EmailAddress'
          - description: The email of the group.
        Name:
          allOf:
          - $ref: '#/components/schemas/GroupName'
          - description: The name of the group.
        State:
          allOf:
          - $ref: '#/components/schemas/EntityState'
          - description: The state of the group, which can be ENABLED, DISABLED, or DELETED.
        EnabledDate:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The date indicating when the group was enabled for WorkMail use.
        DisabledDate:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The date indicating when the group was disabled from WorkMail use.
      description: The representation of an WorkMail group.
    OrganizationNotFoundException: {}
    MaxResults:
      type: integer
      minimum: 1
      maximum: 100
    ListGroupsRequest:
      type: object
      required:
      - OrganizationId
      title: ListGroupsRequest
      properties:
        OrganizationId:
          allOf:
          - $ref: '#/components/schemas/OrganizationId'
          - description: The identifier for the organization under which the groups exist.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/NextToken'
          - description: The token to use to retrieve the next page of results. The first call does not contain any tokens.
        MaxResults:
          allOf:
          - $ref: '#/components/schemas/MaxResults'
          - description: The maximum number of results to return in a single call.
    NextToken:
      type: string
      pattern: '[\S\s]*|[a-zA-Z0-9/+=]{1,1024}'
      minLength: 1
      maxLength: 1024
    WorkMailIdentifier:
      type: string
      minLength: 12
      maxLength: 256
    EntityNotFoundException: {}
    Timestamp:
      type: string
      format: date-time
    EmailAddress:
      type: string
      pattern: '[a-zA-Z0-9._%+-]{1,64}@[a-zA-Z0-9.-]+\.[a-zA-Z-]{2,}'
      minLength: 1
      maxLength: 254
    GroupName:
      type: string
      pattern: '[\u0020-\u00FF]+'
      minLength: 1
      maxLength: 256
  parameters:
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
