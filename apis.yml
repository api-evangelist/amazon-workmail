aid: amazon-workmail
name: Amazon WorkMail
description: >-
  Amazon WorkMail is a secure, managed business email and calendar service with
  support for existing desktop and mobile email client applications. It provides
  encrypted mailboxes, corporate calendaring, full Outlook compatibility, and
  enterprise-grade security controls for business communications.
