naftiko: "1.0.0-alpha1"

info:
  label: "Amazon WorkMail API"
  description: "Programmatic access to Amazon WorkMail organizations, users, groups, aliases, mailboxes, and mobile device management."
  tags:
    - AWS
    - Email
    - Calendar
    - Business Communication
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: workmail
      baseUri: https://workmail.us-east-1.amazonaws.com
      description: "Amazon WorkMail REST API for email organization management."
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources:
        - name: organizations
          path: /organizations
          description: "Manage WorkMail organizations."
          operations:
            - name: list-organizations
              method: GET
              description: "List WorkMail organizations in the account."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-organization
              method: POST
              description: "Create a new WorkMail organization."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  Alias: "{{tools.alias}}"

        - name: users
          path: /organizations/{OrganizationId}/users
          description: "Manage users in a WorkMail organization."
          operations:
            - name: list-users
              method: GET
              description: "List users in the organization."
              inputParameters:
                - name: OrganizationId
                  in: path
                  type: string
                  required: true
                  description: "The organization identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-user
              method: POST
              description: "Create a new user."
              inputParameters:
                - name: OrganizationId
                  in: path
                  type: string
                  required: true
                  description: "The organization identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  Name: "{{tools.name}}"
                  DisplayName: "{{tools.display_name}}"
                  Password: "{{tools.password}}"

        - name: groups
          path: /organizations/{OrganizationId}/groups
          description: "Manage groups in a WorkMail organization."
          operations:
            - name: list-groups
              method: GET
              description: "List groups in the organization."
              inputParameters:
                - name: OrganizationId
                  in: path
                  type: string
                  required: true
                  description: "The organization identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: mailboxes
          path: /organizations/{OrganizationId}/mailbox-export-jobs
          description: "Manage mailbox export jobs."
          operations:
            - name: list-mailbox-export-jobs
              method: GET
              description: "List mailbox export jobs."
              inputParameters:
                - name: OrganizationId
                  in: path
                  type: string
                  required: true
                  description: "The organization identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: mobile-device-access-rules
          path: /organizations/{OrganizationId}/mobile-device-access/rules
          description: "Manage mobile device access rules."
          operations:
            - name: list-mobile-device-access-rules
              method: GET
              description: "List mobile device access rules."
              inputParameters:
                - name: OrganizationId
                  in: path
                  type: string
                  required: true
                  description: "The organization identifier."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: workmail-rest
      resources:
        - path: /v1/organizations
          name: organizations
          description: "Organization management."
          operations:
            - method: GET
              name: list-organizations
              description: "List WorkMail organizations."
              call: "workmail.list-organizations"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users
          name: users
          description: "User management."
          operations:
            - method: GET
              name: list-users
              description: "List users in an organization."
              call: "workmail.list-users"
              with:
                OrganizationId: "rest.organization_id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/groups
          name: groups
          description: "Group management."
          operations:
            - method: GET
              name: list-groups
              description: "List groups in an organization."
              call: "workmail.list-groups"
              with:
                OrganizationId: "rest.organization_id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: workmail-mcp
      transport: http
      tools:
        - name: list-organizations
          description: "List WorkMail organizations in the AWS account."
          hints:
            readOnly: true
            openWorld: true
          call: "workmail.list-organizations"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-users
          description: "List users in a WorkMail organization."
          hints:
            readOnly: true
            openWorld: false
          call: "workmail.list-users"
          with:
            OrganizationId: "tools.organization_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-user
          description: "Create a new WorkMail user."
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "workmail.create-user"
          with:
            OrganizationId: "tools.organization_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-groups
          description: "List groups in a WorkMail organization."
          hints:
            readOnly: true
            openWorld: false
          call: "workmail.list-groups"
          with:
            OrganizationId: "tools.organization_id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-mobile-device-access-rules
          description: "List mobile device access rules for the organization."
          hints:
            readOnly: true
            openWorld: false
          call: "workmail.list-mobile-device-access-rules"
          with:
            OrganizationId: "tools.organization_id"
          outputParameters:
            - type: object
              mapping: "$."
